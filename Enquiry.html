<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Enquire about custom salads, bulk orders or special requests with Foraged by Farhana.">
    <meta name="keywords" content="salads, healthy food, Lenasia, fresh salads, catering">
    <link rel="stylesheet" href="css/style.css">
    <title>Enquiry | Foraged by Farhana</title>
</head>
<body>
    <!-- Banner -->
    <div class="banner">
        <div class="navbar">
            <img src="images/Foraged_logo.jpg" class="logo" alt="Foraged by Farhana Logo">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="About.html">About Us</a></li>
                <li><a href="Menu.html">Menu</a></li>
                <li><a href="FAQ.html">FAQ</a></li>
                <li><a href="Enquiry.html">Enquiry</a></li>
                <li><a href="Contact.html">Contact</a></li>
            </ul>
        </div>
        <hr color="#1d9704">
    </div>

    <div class="content enquiry-page">
        <h1>Make an Enquiry</h1>
        <p>Interested in a custom order, bulk catering, or have a special request? Let us know!</p>

        <form id="enquiryForm" action="https://formspree.io/f/mvznjajb" method="POST" class="form">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone (WhatsApp):</label>
            <input type="tel" id="phone" name="phone" placeholder="083 573 6255">

            <label for="service">What are you enquiring about?</label>
            <select id="service" name="service" required>
                <option value="">Select...</option>
                <option value="Custom Salad Order">Custom Salad Order</option>
                <option value="Bulk/Catering Order">Bulk/Catering Order</option>
                <option value="Other">Other</option>
            </select>

            <label for="message">Message / Special Requests:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send Enquiry</button>
        </form>
    </div>

    <footer>
        <p>© Foraged_by_Farhana<br>Created by: Faeez Beg</p>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
